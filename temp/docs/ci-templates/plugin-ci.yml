name: plugin-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  BUILD_CONFIGURATION: "Release"
  SOLUTION_PATH: "src/YourPlugin.sln"
  UNIT_TEST_PROJECTS: "tests/unit/**/*.csproj"
  PROVIDER_CONTRACT_TEST_PROJECTS: "tests/provider-contract/**/*.csproj"
  INTEGRATION_TEST_PROJECTS: "tests/integration/**/*.csproj"
  RUN_INTEGRATION_TESTS: "false"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration "${{ env.BUILD_CONFIGURATION }}" --no-restore

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "${UNIT_TEST_PROJECTS}" > /dev/null; then
            dotnet test ${UNIT_TEST_PROJECTS} \
              --configuration "${BUILD_CONFIGURATION}" \
              --no-build \
              --logger "trx;LogFileName=unit-tests.trx" \
              --results-directory "artifacts/test-results"
          else
            echo "No unit test projects matched pattern: ${UNIT_TEST_PROJECTS}"
            exit 1
          fi

      - name: Run provider-contract tests
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "${PROVIDER_CONTRACT_TEST_PROJECTS}" > /dev/null; then
            dotnet test ${PROVIDER_CONTRACT_TEST_PROJECTS} \
              --configuration "${BUILD_CONFIGURATION}" \
              --no-build \
              --logger "trx;LogFileName=provider-contract-tests.trx" \
              --results-directory "artifacts/test-results"
          else
            echo "No provider-contract test projects matched pattern: ${PROVIDER_CONTRACT_TEST_PROJECTS}"
            exit 1
          fi

      - name: Run integration tests (optional)
        if: env.RUN_INTEGRATION_TESTS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "${INTEGRATION_TEST_PROJECTS}" > /dev/null; then
            dotnet test ${INTEGRATION_TEST_PROJECTS} \
              --configuration "${BUILD_CONFIGURATION}" \
              --no-build \
              --logger "trx;LogFileName=integration-tests.trx" \
              --results-directory "artifacts/test-results"
          else
            echo "No integration test projects matched pattern: ${INTEGRATION_TEST_PROJECTS}"
            exit 1
          fi

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-test-results
          path: artifacts/test-results
          if-no-files-found: warn
